le&quot;:[0,&quot;Além do Trabalho&quot;],&quot;subtitle&quot;:[0,&quot;O que eu faço longe do teclado — e algumas coisas que construo só por diversão.&quot;]}],&quot;topics&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;outdoors&quot;],&quot;emoji&quot;:[0,&quot;🥾&quot;],&quot;title&quot;:[0,&quot;Aventuras &amp; Esportes&quot;],&quot;summary&quot;:[0,&quot;Trilhas, montanhas, vôlei e uma boa pelada de futebol.&quot;],&quot;body_html&quot;:[0,&quot;&lt;p&gt;Adoro natureza, e fazer trilhas 🏔️. Já escalei alguns dos picos mais altos do Brasil e já fiz uma trilha de &lt;b&gt;250&amp;nbsp;km&lt;/b&gt; de distância até Aparecida. Meu próximo grande sonho — que pretendo realizar em breve — é fazer o &lt;b&gt;Caminho de Santiago&lt;/b&gt;. Quando não estou em uma trilha, você me encontra jogando vôlei 🏐 ou, como todo bom brasileiro, futebol ⚽.&lt;/p&gt;&quot;],&quot;images&quot;:[1,[]],&quot;links&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;open-source&quot;],&quot;emoji&quot;:[0,&quot;🌱&quot;],&quot;title&quot;:[0,&quot;Código Aberto&quot;],&quot;summary&quot;:[0,&quot;Construindo sobre as soluções uns dos outros para que todos tenhamos uma tecnologia melhor.&quot;],&quot;body_html&quot;:[0,&quot;&lt;p&gt;Adoro a ideia por trás do código aberto: a solução de uma pessoa pode se tornar um trampolim para o problema de outra — e essa pessoa pode retribuir da mesma forma. No fim, todos nos beneficiamos de uma tecnologia mais madura e mais capaz.&lt;/p&gt;&lt;p&gt;No momento estou contribuindo com uma biblioteca de componentes &lt;b&gt;Django&amp;nbsp;+&amp;nbsp;HTMX&lt;/b&gt;, onde venho reunindo os padrões que uso todos os dias enquanto construo projetos reais.&lt;/p&gt;&quot;],&quot;images&quot;:[1,[]],&quot;links&quot;:[1,[[0,{&quot;label&quot;:[0,&quot;django-sample-components&quot;],&quot;url&quot;:[0,&quot;https://pypi.org/project/django-sample-components/&quot;],&quot;note&quot;:[0,&quot;PyPI&quot;]}]]]}],[0,{&quot;id&quot;:[0,&quot;side-projects&quot;],&quot;emoji&quot;:[0,&quot;🛠️&quot;],&quot;title&quot;:[0,&quot;Ferramentas &amp; Passatempos que Crio&quot;],&quot;summary&quot;:[0,&quot;Pegando pequenos incômodos do dia a dia e programando minha própria solução.&quot;],&quot;body_html&quot;:[0,&quot;&lt;p&gt;Adoro pegar um pequeno problema do dia a dia e construir minha própria solução para ele. Aqui estão alguns deles:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;b&gt;Quem?&lt;/b&gt; — uma versão web gratuita e sem anúncios do jogo de festa \&quot;Quem sou eu?\&quot; que jogo com os amigos. Os apps na Play Store são tomados por anúncios e barreiras pagas, então criei o meu próprio.&lt;/li&gt;&lt;li&gt;&lt;b&gt;Conversor PTAX&lt;/b&gt; — no Brasil, faturar para clientes estrangeiros significa converter os valores usando uma taxa especial do Banco Central. O site oficial é difícil de usar, então peguei a API deles e a embrulhei em uma interface mais agradável.&lt;/li&gt;&lt;/ul&gt;&quot;],&quot;images&quot;:[1,[]],&quot;links&quot;:[1,[[0,{&quot;label&quot;:[0,&quot;Jogar \&quot;Quem?\&quot;&quot;],&quot;url&quot;:[0,&quot;https://gustavorizzo.github.io/game-quem-sou-eu/&quot;],&quot;note&quot;:[0,&quot;Grátis · só PT-BR&quot;]}],[0,{&quot;label&quot;:[0,&quot;Conversor PTAX&quot;],&quot;url&quot;:[0,&quot;https://gustavorizzo.github.io/conversor-ptax-logger/&quot;],&quot;note&quot;:[0,&quot;Grátis · só PT-BR&quot;]}]]]}],[0,{&quot;id&quot;:[0,&quot;tech-events&quot;],&quot;emoji&quot;:[0,&quot;🏆&quot;],&quot;title&quot;:[0,&quot;Eventos de Tecnologia &amp; Hackathons&quot;],&quot;summary&quot;:[0,&quot;Meetups, conferências e a emoção de ganhar meu primeiro hackathon.&quot;],&quot;body_html&quot;:[0,&quot;&lt;p&gt;Sempre gostei de frequentar eventos de tecnologia, porque é onde encontramos os verdadeiros entusiastas da área! 🤖 Tudo começou lá atrás, na faculdade, dando monitoria e participando do &lt;b&gt;IEEE&lt;/b&gt; (Instituto de Engenheiros Eletricistas e Eletrônicos). E nunca vou me esquecer do momento que ganhei o primeiro &lt;b&gt;Hackathon&lt;/b&gt;. 🏆 Ainda hoje, sempre que posso, vou aos eventos e assisto aos amigos palestrarem.&lt;/p&gt;&quot;],&quot;images&quot;:[1,[[0,{&quot;src&quot;:[0,&quot;hobbies/tech-events-1-inov-week.webp&quot;],&quot;alt&quot;:[0,&quot;Mosaico de fotos do Inov Week&quot;]}],[0,{&quot;src&quot;:[0,&quot;hobbies/tech-events-2-vista.webp&quot;],&quot;alt&quot;:[0,&quot;Vista do local do evento HackingRio&quot;]}],[0,{&quot;src&quot;:[0,&quot;hobbies/tech-events-3-time.webp&quot;],&quot;alt&quot;:[0,&quot;Meu time no HackingRio&quot;]}],[0,{&quot;src&quot;:[0,&quot;hobbies/tech-events-4-premio.webp&quot;],&quot;alt&quot;:[0,&quot;Recebendo o prêmio do hackathon&quot;]}],[0,{&quot;src&quot;:[0,&quot;hobbies/tech-events-5-ieee.webp&quot;],&quot;alt&quot;:[0,&quot;Com o grupo do IEEE na faculdade&quot;]}]]],&quot;links&quot;:[1,[]]}]]]}],&quot;labels&quot;:[0,{&quot;readMore&quot;:[0,&quot;Ler mais →&quot;],&quot;close&quot;:[0,&quot;Fechar&quot;],&quot;openDetails&quot;:[0,&quot;Abrir detalhes sobre {{title}}&quot;],&quot;expandImage&quot;:[0,&quot;Expandir imagem: {{alt}}&quot;],&quot;previousImage&quot;:[0,&quot;Imagem anterior&quot;],&quot;nextImage&quot;:[0,&quot;Próxima imagem&quot;]}]}" ssr client="visible" opts="{&quot;name&quot;:&quot;SectionBeyondWork&quot;,&quot;value&quot;:true}" await-children><section class="beyond-work"><h1 class="section-title">Além do Trabalho</h1><p class="beyond-work__subtitle">O que eu faço longe do teclado — e algumas coisas que construo só por diversão.</p><div class="beyond-work__fan" style="--total:4"><button type="button" class="hobby-card" style="--i:0" aria-label="Abrir detalhes sobre Aventuras &amp; Esportes"><span class="hobby-card__emoji" aria-hidden="true">🥾</span><h2 class="hobby-card__title">Aventuras &amp; Esportes</h2><p class="hobby-card__summary">Trilhas, montanhas, vôlei e uma boa pelada de futebol.</p><span class="hobby-card__hint">Ler mais →</span></button><button type="button" class="hobby-card" style="--i:1" aria-label
