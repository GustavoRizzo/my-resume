quot;body_html&quot;:[0,&quot;&lt;p&gt;Adoro pegar um pequeno problema do dia a dia e construir minha própria solução para ele. Aqui estão alguns deles:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;b&gt;Quem?&lt;/b&gt; — uma versão web gratuita e sem anúncios do jogo de festa \&quot;Quem sou eu?\&quot; que jogo com os amigos. Os apps na Play Store são tomados por anúncios e barreiras pagas, então criei o meu próprio.&lt;/li&gt;&lt;li&gt;&lt;b&gt;Conversor PTAX&lt;/b&gt; — no Brasil, faturar para clientes estrangeiros significa converter os valores usando uma taxa especial do Banco Central. O site oficial é difícil de usar, então peguei a API deles e a embrulhei em uma interface mais agradável.&lt;/li&gt;&lt;/ul&gt;&quot;],&quot;links&quot;:[1,[[0,{&quot;label&quot;:[0,&quot;Jogar \&quot;Quem?\&quot;&quot;],&quot;url&quot;:[0,&quot;https://gustavorizzo.github.io/game-quem-sou-eu/&quot;],&quot;note&quot;:[0,&quot;Grátis · só PT-BR&quot;]}],[0,{&quot;label&quot;:[0,&quot;Conversor PTAX&quot;],&quot;url&quot;:[0,&quot;https://gustavorizzo.github.io/conversor-ptax-logger/&quot;],&quot;note&quot;:[0,&quot;Grátis · só PT-BR&quot;]}]]]}]]]}],&quot;labels&quot;:[0,{&quot;readMore&quot;:[0,&quot;Ler mais →&quot;],&quot;close&quot;:[0,&quot;Fechar&quot;],&quot;openDetails&quot;:[0,&quot;Abrir detalhes sobre {{title}}&quot;]}]}" ssr client="visible" opts="{&quot;name&quot;:&quot;SectionBeyondWork&quot;,&quot;value&quot;:true}" await-children><section class="beyond-work"><h1 class="section-title">Além do Trabalho</h1><p class="beyond-work__subtitle">O que eu faço longe do teclado — e algumas coisas que construo só por diversão.</p><div class="beyond-work__fan" style="--total:3"><button type="button" class="hobby-card" style="--i:0" aria-label="Abrir detalhes sobre Aventuras &amp; Esportes"><span class="hobby-card__emoji" aria-hidden="true">🥾</span><h2 class="hobby-card__title">Aventuras &amp; Esportes</h2><p class="hobby-card__summary">Trilhas, montanhas, vôlei e uma boa pelada de futebol.<
