le&quot;:[0,&quot;Tools &amp; Pastimes I Build&quot;],&quot;summary&quot;:[0,&quot;Taking small everyday annoyances and coding my own fix.&quot;],&quot;body_html&quot;:[0,&quot;&lt;p&gt;I love taking a small everyday problem and building my own solution for it. Here are a couple of them:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;b&gt;Quem?&lt;/b&gt; — a free, ad-free web version of the \&quot;Who am I?\&quot; party game I play with friends. The Play Store apps are buried in ads and paywalls, so I built my own.&lt;/li&gt;&lt;li&gt;&lt;b&gt;PTAX Converter&lt;/b&gt; — in Brazil, invoicing foreign clients means converting the amounts using a special Central Bank rate. The official site is painful to use, so I took their API and wrapped it in a nicer interface.&lt;/li&gt;&lt;/ul&gt;&quot;],&quot;images&quot;:[1,[]],&quot;links&quot;:[1,[[0,{&quot;label&quot;:[0,&quot;Play \&quot;Quem?\&quot;&quot;],&quot;url&quot;:[0,&quot;https://gustavorizzo.github.io/game-quem-sou-eu/&quot;],&quot;note&quot;:[0,&quot;Free · PT-BR only&quot;]}],[0,{&quot;label&quot;:[0,&quot;PTAX Converter&quot;],&quot;url&quot;:[0,&quot;https://gustavorizzo.github.io/conversor-ptax-logger/&quot;],&quot;note&quot;:[0,&quot;Free · PT-BR only&quot;]}]]]}],[0,{&quot;id&quot;:[0,&quot;tech-events&quot;],&quot;emoji&quot;:[0,&quot;🏆&quot;],&quot;title&quot;:[0,&quot;Tech Events &amp; Hackathons&quot;],&quot;summary&quot;:[0,&quot;Meetups, conferences, and the thrill of winning my first hackathon.&quot;],&quot;body_html&quot;:[0,&quot;&lt;p&gt;I&#39;ve always loved going to tech events, because that&#39;s where you find the true enthusiasts of the field! 🤖 It all started back in college, tutoring classmates and taking part in the &lt;b&gt;IEEE&lt;/b&gt; (Institute of Electrical and Electronics Engineers). And I&#39;ll never forget the moment I won my first &lt;b&gt;Hackathon&lt;/b&gt;. 🏆 To this day, whenever I can, I go to events and watch my friends give talks.&lt;/p&gt;&quot;],&quot;images&quot;:[1,[[0,{&quot;src&
